{% extends 'base.html' %}
{% block title %}게시글 작성{% endblock %}

{% set active_menu = 'board' %}

{% block content %}
<header class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 gap-6">
    <div>
        <h2 class="text-3xl font-black text-slate-800 flex items-center italic tracking-tighter">
            <i class="fas fa-comments text-yuanta mr-3"></i>UNION BOARD
        </h2>
        <p class="text-xs text-slate-400 mt-2 font-medium uppercase tracking-widest">조합원 소통과 연대를 위한 자유게시판</p>
    </div>
    <a href="/board" class="px-6 py-3 bg-white text-slate-800 rounded-xl text-sm font-bold shadow-sm border border-slate-200 hover:bg-slate-50 transition-all">
        <i class="fas fa-list mr-2"></i>목록 보기
    </a>
</header>

<section class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-8 md:p-12">
    <h3 class="text-xl font-black text-slate-800 mb-8 border-b border-slate-100 pb-4">
        <i class="fas fa-edit text-yuanta mr-2"></i>새 게시글 작성
    </h3>

    <form action="/board/save" method="POST" class="space-y-6">
        <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">제목</label>
            <input type="text" name="title" required placeholder="제목을 입력하세요 (최대 100자)"
                class="form-input text-lg font-bold w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-yuanta/20">
        </div>
        <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">내용</label>
            <textarea name="content" rows="15" required placeholder="조합원들과 자유롭게 의견을 나누어 보세요. 상호 존중하는 문화를 만들어갑니다."
                class="form-input resize-none leading-relaxed text-slate-700 min-h-[300px] w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-yuanta/20"></textarea>
        </div>
        <div class="pt-6 text-center">
            <button type="submit" class="px-16 py-4 bg-slate-800 text-white rounded-2xl text-sm font-black hover:bg-yuanta shadow-xl shadow-slate-200 transition-all tracking-widest uppercase">
                게시글 등록
            </button>
        </div>
    </form>
</section>
{% endblock %}
